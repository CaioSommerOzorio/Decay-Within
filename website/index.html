<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Decay Within</title>
  </head>
  <body>
    <div id="playarea">
      <div id="opponent">
        <div class="bin" id="obin"></div>
        <div class="hand" id="ohand"></div>
        <div class="deck" id="odeck"></div>
        <div class="ld" id="old"></div>
      </div>
      <div id="play"></div>
      <div id="player">
        <div class="bin" id="bin"></div>
        <div class="hand" id="hand"></div>
        <div class="deck" id="deck"></div>
        <div class="ld" id="ld"></div>
      </div>
    </div>
    <div id="leftmenu">
      <div id="cardpreview"><img></div>
      <div id="carddetails"></div>
    </div>
    <div id="popup">
      <span>View</span>
      <span>Send to play</span>
      <span>Send to hand</span>
      <span>Send to bin</span>
    </div>
    <script src="script.js"></script>
  </body>
</html>
